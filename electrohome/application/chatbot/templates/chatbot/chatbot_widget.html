<style>

#eh-chatbot-toggle {

    width: 60px !important;
    height: 60px !important;
    min-width: 60px !important;
    min-height: 60px !important;
    max-width: 60px !important;
    max-height: 60px !important;

}

}

/* ================================================

#eh-chatbot-input-container {

</style>

<!-- ============================================
     HTML DEL CHATBOT
     ============================================ -->

<!-- BotГіn Flotante -->
<button id="eh-chatbot-toggle" title="Abrir asistente virtual" aria-label="Chatbot">
    рҹ’¬
</button>

<!-- Contenedor del Chat -->
<div id="eh-chatbot-container">
    <!-- Header -->
    <div id="eh-chatbot-header">
        <div>
            <div id="eh-chatbot-header-title">

<!-- ============================================
     JAVASCRIPT DEL CHATBOT INTELIGENTE
     ============================================ -->
<script>
(function() {
    'use strict';
    
    // ==========================================
    // CONFIGURACIГ“N GLOBAL - CORREGIDA
    // ==========================================
    const CHATBOT_CONFIG = {
        {% if user.is_authenticated %}
        userName: '{{ user.first_name|escapejs }}',
        userLastName: '{{ user.last_name|escapejs }}',
        isAuthenticated: true,
        userEmail: '{{ user.email|escapejs }}',
        {% else %}
        userName: '',
        userLastName: '',
        isAuthenticated: false,
        userEmail: '',
        {% endif %}
        supportEmail: 'soporte@electrohome.com',
        supportPhone: '+57 300 760 7645',
        whatsappLink: 'https://wa.me/573007607645',
        companyName: 'ElectroHome'
    };
    
    // Estado de la conversaciГіn
    let conversationContext = {
        topic: null,
        needsHumanSupport: false,
        lastIntent: null,
        messageCount: 0
    };
    
    document.addEventListener('DOMContentLoaded', function() {
        console.log('рҹӨ– Iniciando chatbot inteligente ElectroHome...');
        
        const toggle = document.getElementById('eh-chatbot-toggle');
        const container = document.getElementById('eh-chatbot-container');
        const close = document.getElementById('eh-chatbot-close');
        const send = document.getElementById('eh-chatbot-send');
        const input = document.getElementById('eh-chatbot-input');
        const body = document.getElementById('eh-chatbot-body');
        const quickReplies = document.getElementById('quick-replies');
        
        if (!toggle || !container) {
            console.error('вқҢ Elementos del chatbot no encontrados');
            return;
        }
        
        // ==========================================
        // FUNCIONES DE INTERFAZ
        // ==========================================
        
        function openChat() {
            container.classList.add('open');
            if (conversationContext.messageCount === 0) {
                initializeChat();
            }
            setTimeout(function() { input.focus(); }, 300);
        }
        
        function closeChat() {
            container.classList.remove('open');
        }
        
        function addMessage(text, sender, isHTML) {
            if (isHTML === undefined) isHTML = false;
            
            const msg = document.createElement('div');
            msg.className = 'message ' + sender + '-message';
            
            if (isHTML) {
                msg.innerHTML = text;
            } else {
                msg.textContent = text;
            }
            
            body.appendChild(msg);
            body.scrollTop = body.scrollHeight;
            conversationContext.messageCount++;
        }
        
        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typing';
            typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            body.appendChild(typing);
            body.scrollTop = body.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        function showQuickReplies(replies) {
            quickReplies.innerHTML = '';
            replies.forEach(function(reply) {
                const btn = document.createElement('button');
                btn.className = 'quick-reply-btn';
                btn.textContent = reply.text;
                btn.onclick = function() {
                    input.value = reply.value;
                    sendMessage();
                    quickReplies.style.display = 'none';
                };
                quickReplies.appendChild(btn);
            });
            quickReplies.style.display = 'flex';
        }
        
        function hideQuickReplies() {
            quickReplies.style.display = 'none';
        }
        
        // ==========================================
        // INICIALIZACIГ“N DEL CHAT
        // ==========================================
        
        function initializeChat() {
            const greeting = getGreeting();
            addMessage(greeting, 'bot');
            
            setTimeout(function() {
                const initialSuggestions = [
                    { text: 'рҹӣҚпёҸ Ver productos', value: 'Quiero ver productos' },
                    { text: 'рҹ“Ұ Rastrear pedido', value: 'Rastrear mi pedido' },
                    { text: 'рҹ’і MГ©todos de pago', value: 'CГіmo puedo pagar' },
                    { text: 'рҹ“һ Contactar asesor', value: 'Necesito hablar con un asesor' }
                ];
                showQuickReplies(initialSuggestions);
            }, 500);
        }
        
        function getGreeting() {
            const hour = new Date().getHours();
            let timeGreeting = '';
            
            if (hour < 12) timeGreeting = 'Buenos dГӯas';
            else if (hour < 18) timeGreeting = 'Buenas tardes';
            else timeGreeting = 'Buenas noches';
            
            const userName = CHATBOT_CONFIG.userName || 'amigo/a';
            
            if (CHATBOT_CONFIG.isAuthenticated) {
                return timeGreeting + ', ' + userName + '! рҹ‘Ӣ Soy tu asistente virtual de ElectroHome. ВҝEn quГ© puedo ayudarte hoy?';
            } else {
                return timeGreeting + '! рҹ‘Ӣ Soy tu asistente virtual de ElectroHome. ВҝEn quГ© puedo ayudarte?';
            }
        }
        
        // ==========================================
        // MOTOR DE INTELIGENCIA CONVERSACIONAL
        // ==========================================
        
        function analyzeIntent(message) {
            const m = message.toLowerCase().trim();
            
            // Saludos
            if (m.match(/^(hola|hey|buenos|buenas|saludos|hi|hello)$/)) {
                return { intent: 'greeting', confidence: 'high' };
            }
            
            // Productos
            if (m.match(/producto|comprar|precio|costo|vale|electrodomГ©stico|nevera|lavadora|cocina|licuadora|televisor|tv|aire|ventilador|catГЎlogo|tienda|disponible/)) {
                return { intent: 'products', confidence: 'high' };
            }
            
            // Pedidos
            if (m.match(/pedido|orden|envГӯo|entrega|rastreo|rastrear|seguimiento|dГіnde estГЎ|cuГЎndo llega|tracking/)) {
                return { intent: 'orders', confidence: 'high' };
            }
            
            // Pagos
            if (m.match(/pago|pagar|tarjeta|transferencia|pse|efectivo|cuotas|financiaciГіn|cГіmo pago/)) {
                return { intent: 'payment', confidence: 'high' };
            }
            
            // Devoluciones - ESCALAMIENTO
            if (m.match(/devol|reembolso|cambio|cambiar|me arrepentГӯ|cancelar|no me gusta|defecto|daГұado|roto/)) {
                return { intent: 'returns_escalate', confidence: 'high' };
            }
            
            // GarantГӯas - ESCALAMIENTO
            if (m.match(/garantГӯa|garantia|falla|problema tГ©cnico|no funciona|se daГұГі|reparaciГіn|servicio tГ©cnico/)) {
                return { intent: 'warranty_escalate', confidence: 'high' };
            }
            
            // Errores de pago - ESCALAMIENTO URGENTE
            if (m.match(/error.*pago|me.*descont|no.*aparece.*pago|pag.*no.*refleja|cobr.*doble|problema.*pago|pag.*fall/)) {
                return { intent: 'payment_error_escalate', confidence: 'high' };
            }
            
            // Contacto directo
            if (m.match(/asesor|humano|persona|hablar|llamar|contacto|telГ©fono|correo|email|whatsapp/)) {
                return { intent: 'contact', confidence: 'high' };
            }
            
            // Ayuda general
            if (m.match(/ayuda|necesito|no entiendo|explica|cГіmo/)) {
                return { intent: 'help', confidence: 'medium' };
            }
            
            // Despedida
            if (m.match(/gracias|chao|adiГіs|bye|hasta luego|nos vemos/)) {
                return { intent: 'goodbye', confidence: 'high' };
            }
            
            return { intent: 'unknown', confidence: 'low' };
        }
        
        function getSmartResponse(message) {
            const analysis = analyzeIntent(message);
            conversationContext.lastIntent = analysis.intent;
            
            let response = '';
            
            switch (analysis.intent) {
                case 'greeting':
                    response = getGreeting();
                    break;
                
                case 'products':
                    conversationContext.topic = 'products';
                    response = 'ВЎExcelente elecciГіn! рҹӣҚпёҸ Tenemos una amplia variedad de electrodomГ©sticos:\n\n' +
                           'вҖў Neveras y congeladores вқ„пёҸ\n' +
                           'вҖў Lavadoras y secadoras рҹ‘•\n' +
                           'вҖў Cocinas y hornos рҹҚі\n' +
                           'вҖў Licuadoras y procesadores рҹҘӨ\n' +
                           'вҖў Televisores y audio рҹ“ә\n\n' +
                           '<a href="/productos/" class="action-button" target="_blank">Ver catГЎlogo completo</a>\n\n' +
                           'ВҝQuГ© tipo de producto estГЎs buscando?';
                    break;
                
                case 'orders':
                    conversationContext.topic = 'orders';
                    if (CHATBOT_CONFIG.isAuthenticated) {
                        response = 'Para consultar el estado de tu pedido, ' + CHATBOT_CONFIG.userName + ', puedes:\n\n' +
                               '1. Ver tus pedidos en tu cuenta рҹ“Ұ\n' +
                               '2. Decirme tu nГәmero de orden\n\n' +
                               '<a href="/pedidos/" class="action-button" target="_blank">Ver mis pedidos</a>\n\n' +
                               'ВҝTienes tu nГәmero de orden a mano?';
                    } else {
                        response = 'Para rastrear tu pedido necesitas:\n\n' +
                               '1. Iniciar sesiГіn en tu cuenta рҹ”җ\n' +
                               '2. O tener tu nГәmero de orden\n\n' +
                               '<a href="/login/" class="action-button" target="_blank">Iniciar sesiГіn</a>\n\n' +
                               'ВҝPrefieres que te ayude de otra forma?';
                    }
                    break;
                
                case 'payment':
                    conversationContext.topic = 'payment';
                    response = 'Aceptamos los siguientes mГ©todos de pago рҹ’і:\n\n' +
                           'вң… Tarjetas de crГ©dito/dГ©bito (Visa, Mastercard)\n' +
                           'вң… PSE (transferencia bancaria)\n' +
                           'вң… Efectivo contra entrega\n' +
                           'вң… FinanciaciГіn hasta 12 cuotas sin intereses\n\n' +
                           'Todas las transacciones son 100% seguras рҹ”’\n\n' +
                           'ВҝTienes alguna pregunta sobre algГәn mГ©todo especГӯfico?';
                    break;
                
                case 'returns_escalate':

        // ==========================================
        // ENVГҚO DE MENSAJES
        // ==========================================
        
        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            
            send.disabled = true;
            input.disabled = true;
            hideQuickReplies();
            
            addMessage(text, 'user');
            input.value = '';
            
            showTyping();
            
            const delay = 800 + Math.random() * 700;
            setTimeout(function() {
                hideTyping();
                const response = getSmartResponse(text);
                addMessage(response, 'bot', true);
                
                send.disabled = false;
                input.disabled = false;
                input.focus();
            }, delay);
        }
        
        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        
        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            openChat();
        });
        
        close.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            closeChat();
        });
        
        send.addEventListener('click', sendMessage);
        
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        console.log('вң… Chatbot inteligente completamente funcional');
        
        // Forzar estilos
        let forceCount = 0;
        const forceStyles = setInterval(function() {
            if (toggle && forceCount < 15) {
                toggle.style.setProperty('display', 'flex', 'important');
                toggle.style.setProperty('visibility', 'visible', 'important');
                toggle.style.setProperty('opacity', '1', 'important');
                toggle.style.setProperty('position', 'fixed', 'important');
                toggle.style.setProperty('bottom', '20px', 'important');
                toggle.style.setProperty('right', '20px', 'important');
                toggle.style.setProperty('z-index', '2147483647', 'important');
                forceCount++;
            } else {
                clearInterval(forceStyles);
            }
        }, 100);
    });
